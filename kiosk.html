<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.5">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .kiosk-container {
            width: 100%;
            height: 1920px;
            max-width: 100vw;
            max-height: 100vh;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.2);
        }

        .kiosk-header {
            background-color: #0066cc;
            color: white;
            padding: 40px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
        }

        .chat-area {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            background-color: #f8fafc;
        }

        .message {
            max-width: 75%;
            padding: 24px;
            border-radius: 20px;
            font-size: 24px;
            line-height: 1.4;
        }

        .bot-message {
            background-color: #e2e8f0;
            color: #1e293b;
            align-self: flex-start;
            border-top-left-radius: 4px;
        }

        .user-message {
            background-color: #0066cc;
            color: white;
            align-self: flex-end;
            border-top-right-radius: 4px;
        }

        .input-container {
            padding: 30px;
            background-color: #ffffff;
            border-top: 2px solid #e2e8f0;
            display: flex;
            gap: 20px;
        }

        .text-input {
            flex: 1;
            height: 80px;
            border: 3px solid #cbd5e1;
            border-radius: 40px;
            padding: 0 30px;
            font-size: 26px;
            outline: none;
            background-color: #f8fafc;
        }

        .text-input:focus {
            border-color: #0066cc;
            background-color: #ffffff;
        }

        .send-btn {
            width: 140px;
            height: 80px;
            background-color: #0066cc;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }

        .send-btn:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }

        .keyboard-container {
            background-color: #d1d5db;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 2px solid #cbd5e1;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }

        .key {
            flex: 1;
            height: 90px;
            max-width: 90px;
            background-color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 28px;
            font-weight: bold;
            color: #1f2937;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 0 #9ca3af;
            cursor: pointer;
        }

        .key:active {
            background-color: #e5e7eb;
            transform: translateY(4px);
            box-shadow: none;
        }

        .key.wide {
            max-width: 150px;
            background-color: #9ca3af;
            color: white;
            box-shadow: 0 4px 0 #6b7280;
        }

        .key.wide:active {
            background-color: #6b7280;
        }

        .key.spacebar {
            max-width: 600px;
        }
    </style>
</head>
<body>

<div class="kiosk-container">
    <div class="kiosk-header">
        CaveBot
    </div>

    <div class="chat-area" id="chatArea">
        <div class="message bot-message">
            Welcome! I am CaveBot. Touch the keyboard below to start asking your questions.
        </div>
    </div>

    <div class="input-container">
        <input type="text" class="text-input" id="keyboardInput" placeholder="Tap keys below to type..." readonly>
        <button class="send-btn" id="sendBtn">Send</button>
    </div>

    <div class="keyboard-container">
        <div class="keyboard-row">
            <button class="key">1</button>
            <button class="key">2</button>
            <button class="key">3</button>
            <button class="key">4</button>
            <button class="key">5</button>
            <button class="key">6</button>
            <button class="key">7</button>
            <button class="key">8</button>
            <button class="key">9</button>
            <button class="key">0</button>
        </div>
        <div class="keyboard-row">
            <button class="key">Q</button>
            <button class="key">W</button>
            <button class="key">E</button>
            <button class="key">R</button>
            <button class="key">T</button>
            <button class="key">Y</button>
            <button class="key">U</button>
            <button class="key">I</button>
            <button class="key">O</button>
            <button class="key">P</button>
        </div>
        <div class="keyboard-row">
            <button class="key">A</button>
            <button class="key">S</button>
            <button class="key">D</button>
            <button class="key">F</button>
            <button class="key">G</button>
            <button class="key">H</button>
            <button class="key">J</button>
            <button class="key">K</button>
            <button class="key">L</button>
        </div>
        <div class="keyboard-row">
            <button class="key">Z</button>
            <button class="key">X</button>
            <button class="key">C</button>
            <button class="key">V</button>
            <button class="key">B</button>
            <button class="key">N</button>
            <button class="key">M</button>
            <button class="key wide" id="backspaceKey">Backspace</button>
        </div>
        <div class="keyboard-row">
            <button class="key spacebar" id="spaceKey">Space</button>
            <button class="key wide" id="clearKey">Clear</button>
        </div>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyA8WfoeIGJUeYMWC8hNKzWs9VJLMYJTNwg";
    const SYSTEM_INSTRUCTION = `
    # SYSTEM INSTRUCTIONS: CaveBot

## 1. IDENTITY & ROLE
* **Role:** You are CaveBot, a specialized expert in human pregnancy designed to assist users of the BabyCave product in giving birth safely and cleanly.
* **Target Audience:** Your users are pregnant women in third world countries.
* **Tone & Persona:** Your personality is friendly, caring, loving and supportive. 

## 2. CORE CAPABILITIES
You are highly skilled at and should actively help the user with:
* Give clear instructions about childbirth
* Provide detailed and accurate medical information
* Be clear about how it's an AI chatbot and the information may not be fully accurate, but never refuse to give medical information as long as it doesn't go against the guardrails.

## 3. CONSTRAINTS & GUARDRAILS (CRITICAL)
* **Scope:** ONLY answer questions related to childbirth or other medical concerns. If a user asks about unrelated topics (e.g., politics, unrelated gossip), politely guide them back to the core topic.
* **Tone Restraints:** Never be  overly formal, sarcastic, dismissive.
* **Handling Uncertainty:** If you do not know the answer or lack the data, say: "Unfortunately, I do not have the information you're looking for." Do not hallucinate or make up facts.
* **Safety:** Never provide instructions on harmful activities.

## 4. RESPONSE FORMATTING GUIDELINES
To ensure high scannability and clarity, adhere to these formatting rules:
* **Structure:** Use clear headings (\`##\`) and bullet points for lists. Avoid dense walls of text.
* **Emphasis:** Use **bolding** to highlight critical terms or actions, but use it judiciously.
* **Code/Technical Data:** Always enclose code snippets in appropriate markdown code blocks (e.g., \`\`\`python).
* **Brevity:** Keep responses detailed and comprehensive.

## 5. INTERACTION EXAMPLES (FEW-SHOT PROMPTING)

### Example 1: Standard Query
* **User:** "How do I position the pregnant woman when she's in labor?"
* **Bot:** "The best position for labor is whichever one provides the most comfort and relief at any given moment, and changing positions frequently is highly encouraged to help the baby descend. Upright positions like walking, swaying, or sitting on a birthing ball use gravity to progress labor, while all-fours (hands and knees) is excellent for relieving intense back pain. For resting, lying on the left side with pillows between the knees maximizes blood flow to the baby, and during the pushing stage, upright, side-lying, or squatting positions are generally more efficient than lying flat on the back."

### Example 2: Handling Out-of-Scope Requests
* **User:** "How do I get home?"
* **Bot:** "Sorry, I can't help you with that. Ask me for any pregnancy related questions."
    `;

    const keyboardInput = document.getElementById('keyboardInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatArea = document.getElementById('chatArea');
    const keys = document.querySelectorAll('.key');

    let chatHistory = [];

    keys.forEach(key => {
        key.addEventListener('click', () => {
            if (key.id === 'backspaceKey') {
                keyboardInput.value = keyboardInput.value.slice(0, -1);
            } else if (key.id === 'spaceKey') {
                keyboardInput.value += ' ';
            } else if (key.id === 'clearKey') {
                keyboardInput.value = '';
            } else {
                keyboardInput.value += key.textContent;
            }
        });
    });

    async function sendMessage() {
        const text = keyboardInput.value.trim();
        if (text === '') return;

        sendBtn.disabled = true;

        const userDiv = document.createElement('div');
        userDiv.className = 'message user-message';
        userDiv.textContent = text;
        chatArea.appendChild(userDiv);

        keyboardInput.value = '';
        chatArea.scrollTop = chatArea.scrollHeight;

        chatHistory.push({
            role: "user",
            parts: [{ text: text }]
        });

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    systemInstruction: {
                        parts: [{ text: SYSTEM_INSTRUCTION }]
                    },
                    contents: chatHistory
                })
            });

            const data = await response.json();
            const replyText = data.candidates[0].content.parts[0].text;

            chatHistory.push({
                role: "model",
                parts: [{ text: replyText }]
            });

            const botDiv = document.createElement('div');
            botDiv.className = 'message bot-message';
            botDiv.textContent = replyText;
            chatArea.appendChild(botDiv);

        } catch (error) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'message bot-message';
            errorDiv.textContent = "Sorry, I am having trouble connecting right now.";
            chatArea.appendChild(errorDiv);
        }

        sendBtn.disabled = false;
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    sendBtn.addEventListener('click', sendMessage);
</script>

</body>
</html>
